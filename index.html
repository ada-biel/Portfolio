<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #111;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

<iframe id="pdfViewer"></iframe>

<script>
    const iframe = document.getElementById("pdfViewer");

    function fileExists(url, callback) {
        fetch(url, { method: 'HEAD' })
            .then(response => callback(response.ok))
            .catch(() => callback(false));
    }

    function loadPDF() {
        if (window.innerWidth <= 768) {
            // 📱 próbujemy mobile
            fileExists("CV-mobile.pdf", function(exists) {
                if (exists) {
                    iframe.src = "CV-mobile.pdf#view=FitH";
                } else {
                    iframe.src = "CV-desktop.pdf#view=FitH";
                }
            });
        } else {
            // 💻 desktop
            iframe.src = "CV-desktop.pdf#view=FitH";
        }
    }

    loadPDF();
    window.addEventListener("resize", loadPDF);
</script>

</body>
</html>
