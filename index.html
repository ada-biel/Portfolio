<!DOCTYPE html>
<html lang="pl">
<head>

    <title>Portfolio – Adrianna Bielińska</title>

    <style>

            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 16px 24px;
            border-bottom: 1px solid #eee;

            text-decoration: none;
            color: black;
            border: 1px solid black;
            padding: 8px 14px;
            font-size: 12px;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

<div class="container">

    <div class="topbar">
        <div class="title">PORTFOLIO</div>

        <a class="button" href="portfolio.pdf" target="_blank">
